{% extends "admin/base.html" %}

{% block title %}{{ title }} | MTS Shop{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">MTS Shop — Administration</a></h1>
{% endblock %}

{% block nav-global %}
<a class="mts-reports-link" href="{% url 'rapports' %}">Rapports</a>
{% endblock %}

{% block extrastyle %}
<style>
  /* ==== Lien Rapports (en-tête) ==== */
  .mts-reports-link {
    margin-left: 20px; color: #fff; font-weight: 600; font-size: 0.8125rem;
    border: 1px solid rgba(255, 255, 255, .5); border-radius: 999px;
    padding: 4px 12px; text-decoration: none; white-space: nowrap;
    transition: background-color .15s ease-out;
  }
  .mts-reports-link:hover, .mts-reports-link:focus {
    background: rgba(255, 255, 255, .14); color: #fff;
  }

  /* ==== Badges sémantiques (même vocabulaire que la page Rapports) ==== */
  .mts-badge {
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: 999px; padding: 3px 10px;
    font-size: 11px; font-weight: 650; white-space: nowrap;
  }
  .mts-badge::before {
    content: ""; width: 7px; height: 7px; border-radius: 999px; background: currentColor;
  }
  .mts-badge--ok      { color: #2e7d5b; background: #e9f4ef; border: 1px solid #cfe6db; }
  .mts-badge--warn    { color: #b45309; background: #fdf3e5; border: 1px solid #f0dcbe; }
  .mts-badge--danger  { color: #b42318; background: #fdecea; border: 1px solid #f3c7c1; }
  .mts-badge--info    { color: #2e5871; background: #e8f0f5; border: 1px solid #c9dbe6; }
  .mts-badge--teal    { color: #0f766e; background: #e6f4f2; border: 1px solid #c3e3df; }
  .mts-badge--neutral { color: #4d5a68; background: #eef2f5; border: 1px solid #dfe5ea; }

  /* ==== Confort de lecture ==== */
  /* Code de paiement en chasse fixe : plus facile à comparer/dicter au comptoir */
  #changelist td.field-validation_code, .field-validation_code .readonly {
    font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
    letter-spacing: .06em;
  }
  #changelist table tbody tr { transition: background-color .12s ease-out; }
  .button, input[type=submit], input[type=button] { border-radius: 6px; }

  @media (prefers-reduced-motion: reduce) {
    .mts-reports-link, #changelist table tbody tr { transition: none; }
  }
</style>
{% endblock %}
