# Orchestration des conteneurs du prototype.
# Lance tout le projet avec une seule commande :  docker compose up

services:
  # --- Base de données PostgreSQL ---
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persiste les données
    ports:
      - "5432:5432"
    healthcheck:
      # Indique à "web" que la base est réellement prête à recevoir des connexions
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Application web Django ---
  web:
    build: .
    # En développement : serveur de dev Django (rechargement auto à chaque modif)
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app                # le code local est monté dans le conteneur
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy   # attend que la base soit prête

volumes:
  postgres_data:
